<!-- 🔥 كودك الكامل والجاهز للتشغيل (مع المنيو المحدث ونظام الصور الذكي) -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Hungry Bites | بيتس - بحرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05000a; font-family: 'Cairo', 'Tajawal', sans-serif; overflow-x: hidden; }
    html { scroll-behavior: smooth; }
    
    .splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000000; display: flex; justify-content: center; align-items: center;
      z-index: 10000; transition: opacity 0.6s ease;
    }
    .splash-logo {
      font-size: 3.5rem; font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #a100ff, #FFD700);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: pulseLogo 1.2s ease-in-out infinite;
    }
    @keyframes pulseLogo {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 20px rgba(161,0,255,0.5); }
    }
    
    .navbar { transition: all 0.2s ease; }
    .navbar-scrolled { background: rgba(5, 0, 10, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(161, 0, 255, 0.3); }
    .logo-text { font-size: 1.6rem; font-weight: 800; }
    .logo-text .hungry { color: #ffffff; }
    .logo-text .bite { color: #ffffff; }
    .logo-text .bite-s { color: #FFD700; text-shadow: 0 0 3px #FFD700; }
    
    .smoke-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
    .smoke-particle { position: absolute; background: radial-gradient(circle, rgba(161, 0, 255, 0.3) 0%, rgba(100, 50, 150, 0) 80%); border-radius: 50%; filter: blur(12px); animation: floatSmoke 3.5s ease-out forwards; }
    @keyframes floatSmoke { 0% { transform: translateY(0) scale(0.3); opacity: 0.5; } 100% { transform: translateY(-180px) scale(1.8); opacity: 0; } }
    
    .glass-card { background: rgba(10, 0, 21, 0.75); backdrop-filter: blur(12px); border: 2px solid rgba(161, 0, 255, 0.4); transition: all 0.3s ease; }
    .glass-card:hover { transform: translateY(-6px); border-color: #a100ff; box-shadow: 0 0 20px rgba(161, 0, 255, 0.4); background: rgba(161, 0, 255, 0.1); }
    
    .menu-section { padding: 4rem 1rem; background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 100%); }
    .menu-title { font-size: 2.5rem; font-weight: 800; text-align: center; margin-bottom: 3rem; background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .menu-title::after { content: ''; display: block; width: 80px; height: 3px; background: linear-gradient(90deg, #a100ff, #ff6a00); margin: 0.75rem auto 0; border-radius: 3px; }
    
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; }
    .menu-item-card { background: rgba(26, 26, 46, 0.6); backdrop-filter: blur(10px); border-radius: 1.25rem; overflow: hidden; border: 1px solid rgba(161, 0, 255, 0.15); opacity: 0; transform: translateY(60px); transition: all 0.6s ease; }
    .menu-item-card.is-visible { opacity: 1; transform: translateY(0); }
    
    .menu-item-image { position: relative; padding-top: 66.67%; overflow: hidden; }
    .menu-item-image img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .menu-item-card:hover .menu-item-image img { transform: scale(1.08); }
    
    .cart-sidebar { position: fixed; top: 0; right: -380px; width: 380px; height: 100vh; background: rgba(5, 0, 10, 0.98); backdrop-filter: blur(20px); border-right: 2px solid #a100ff; z-index: 1000; transition: right 0.25s ease; }
    .cart-sidebar.open { right: 0; }
    .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 999; display: none; }
    .cart-overlay.open { display: block; }

    .order-options-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 10001; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: all 0.3s ease; }
    .order-options-modal.open { visibility: visible; opacity: 1; }
  </style>
</head>
<body>

  <div id="splashScreen" class="splash-screen">
    <div class="splash-logo">Hungry Bites</div>
  </div>

  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* =========================
       📸 نظام معالجة الصور
    ========================= */
    const getImageProps = (localImg, fallbackImg) => {
      return {
        src: localImg,
        onError: (e) => {
          e.target.onerror = null;
          e.target.src = fallbackImg;
        }
      };
    };

    /* =========================
       📦 بيانات المنيو (الصور والأسعار)
    ========================= */
    const menuItems = [
      { id: 1, name: "PANCAKE STACK", price: 28, desc: "بانكيك - طبقات من البانكيك الطري مع شراب القيقب", img: "./8B83FF3A-6529-49E7-9E65-B6DA6B03BDD6.png", fallback: "https://images.pexels.com/photos/376464/pexels-photo-376464.jpeg?auto=compress&w=600" },
      { id: 2, name: "WAFFLE DELIGHT", price: 24, desc: "وافل - وافل ذهبي مقرمش مع العسل والكريمة", img: "./8B83FF3A-6529-49E7-9E65-B6DA6B03BDD6.png", fallback: "https://images.pexels.com/photos/1410235/pexels-photo-1410235.jpeg?auto=compress&w=600" },
      { id: 4, name: "HUNGRY BITES CLASSIC", price: 32, desc: "هنجري بايتس كلاسيك - برجر كلاسيكي بصوص خاص", img: "./8B83FF3A-6529-49E7-9E65-B6DA6B03BDD6.png", fallback: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?auto=compress&w=600" },
      { id: 6, name: "CLUB SANDWICH", price: 26, desc: "كلوب ساندويتش - ساندويتش دجاج مع خضار طازجة", img: "./45D95FA1-C92D-4E36-B5B9-201550C49059.png", fallback: "https://images.pexels.com/photos/1059905/pexels-photo-1059905.jpeg?auto=compress&w=600" },
      { id: 9, name: "BEEF BURGER", price: 29, desc: "برجر لحم بقري - لحم بقري مشوي مع جبن", img: "./45D95FA1-C92D-4E36-B5B9-201550C49059.png", fallback: "https://images.pexels.com/photos/2983101/pexels-photo-2983101.jpeg?auto=compress&w=600" },
      { id: 11, name: "CHICKEN CRISPY", price: 28, desc: "دجاج كريسبي - قطع دجاج مقرمشة", img: "./1480A057-5459-4773-93C1-08394E76EA6F.png", fallback: "https://images.pexels.com/photos/2338407/pexels-photo-2338407.jpeg?auto=compress&w=600" },
      { id: 25, name: "MIX FRIES", price: 22, desc: "مكس فرايز - بطاطس مقلية مشكلة", img: "./168E19AA-905F-4291-A7FD-0047445E1C7F.png", fallback: "https://images.pexels.com/photos/1583884/pexels-photo-1583884.jpeg?auto=compress&w=600" },
      { id: 40, name: "PEPSI", price: 7, desc: "بيبسي بارد", img: "./168E19AA-905F-4291-A7FD-0047445E1C7F.png", fallback: "https://images.pexels.com/photos/2983101/pexels-photo-2983101.jpeg?auto=compress&w=600" }
    ];

    /* =========================
       🏠 المكون الرئيسي (App)
    ========================= */
    const App = () => {
      const [cart, setCart] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);
      const [showOrderOptions, setShowOrderOptions] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        setTimeout(() => {
          const splash = document.getElementById('splashScreen');
          if (splash) splash.style.opacity = '0';
          setTimeout(() => splash && (splash.style.display = 'none'), 600);
        }, 2000);

        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        
        // مراقب الظهور للكروت
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('is-visible') });
        }, { threshold: 0.1 });
        document.querySelectorAll('.menu-item-card').forEach(card => observer.observe(card));

        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const addToCart = (item) => {
        const exist = cart.find(i => i.id === item.id);
        if (exist) {
          setCart(cart.map(i => i.id === item.id ? {...i, qty: i.qty + 1} : i));
        } else {
          setCart([...cart, {...item, qty: 1}]);
        }
      };

      const sendToWhatsApp = (type) => {
        let msg = `طلبية جديدة (${type === 'delivery' ? 'توصيل' : 'استلام'}):%0A`;
        cart.forEach(item => msg += `- ${item.name} (عدد ${item.qty})%0A`);
        window.open(`https://wa.me/966564035409?text=${msg}`, '_blank');
      };

      return (
        <div className="min-h-screen text-white">
          
          {/* سلة المشتريات الجانبية */}
          <div className={`cart-overlay ${cartOpen ? 'open' : ''}`} onClick={() => setCartOpen(false)}></div>
          <div className={`cart-sidebar ${cartOpen ? 'open' : ''} p-6 flex flex-col`}>
             <h2 className="text-2xl font-bold border-b border-purple-500 pb-4 mb-4">سلتك 🛒</h2>
             <div className="flex-1 overflow-y-auto">
               {cart.map(item => (
                 <div key={item.id} className="flex justify-between items-center mb-4 bg-white/5 p-3 rounded-lg">
                   <div>
                     <p className="font-bold">{item.name}</p>
                     <p className="text-purple-400">{item.price * item.qty} ر.س</p>
                   </div>
                   <span className="bg-purple-600 px-3 py-1 rounded-full">{item.qty}</span>
                 </div>
               ))}
             </div>
             <button onClick={() => setShowOrderOptions(true)} className="w-full bg-green-600 py-4 rounded-full font-bold mt-4">إتمام الطلب</button>
          </div>

          {/* نافذة خيارات الطلب */}
          <div className={`order-options-modal ${showOrderOptions ? 'open' : ''}`}>
             <div className="bg-zinc-900 p-8 rounded-3xl border border-purple-500 w-80 text-center">
                <h3 className="text-xl font-bold mb-6">اختر طريقة الاستلام</h3>
                <button onClick={() => sendToWhatsApp('delivery')} className="w-full bg-purple-600 py-3 rounded-xl mb-3">📦 توصيل</button>
                <button onClick={() => sendToWhatsApp('pickup')} className="w-full bg-orange-500 py-3 rounded-xl mb-3">🏠 استلام شخصي</button>
                <button onClick={() => setShowOrderOptions(false)} className="text-gray-400 mt-2">إلغاء</button>
             </div>
          </div>

          {/* الهيدر */}
          <nav className={`fixed top-0 w-full z-50 p-5 transition-all ${scrolled ? 'navbar-scrolled' : ''}`}>
            <div className="container mx-auto flex justify-between items-center">
              <div className="logo-text"><span className="hungry">Hungry </span><span className="bite-s">Bites</span></div>
              <button onClick={() => setCartOpen(true)} className="relative bg-purple-600 p-3 rounded-full">
                <i className="fas fa-shopping-cart"></i>
                {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-red-500 text-xs w-5 h-5 flex items-center justify-center rounded-full">{cart.reduce((a,b)=>a+b.qty,0)}</span>}
              </button>
            </div>
          </nav>

          {/* واجهة البداية (Hero) */}
          <div className="h-screen relative flex items-center justify-center text-center">
            <img src="https://images.pexels.com/photos/2983101/pexels-photo-2983101.jpeg?auto=compress&w=1600" className="absolute inset-0 w-full h-full object-cover brightness-[0.3]" />
            <div className="relative z-10 px-5">
              <h1 className="text-6xl font-extrabold mb-4">الجوع ماله حل..<br/><span className="text-purple-500">إلا بيتس!</span></h1>
              <p className="text-xl text-gray-300">فرع بحرة | أفضل تجربة برجر ووافل</p>
            </div>
          </div>

          {/* المنيو */}
          <section className="menu-section">
            <div className="container mx-auto px-5">
              <h2 className="menu-title">قائمتنا</h2>
              <div className="menu-grid">
                {menuItems.map(item => (
                  <div key={item.id} className="menu-item-card">
                    <div className="menu-item-image">
                      <img 
                        {...getImageProps(item.img, item.fallback)}
                        alt={item.name}
                        loading="lazy"
                      />
                    </div>
                    <div className="p-5">
                      <h3 className="text-xl font-bold mb-2">{item.name}</h3>
                      <p className="text-gray-400 text-sm mb-4">{item.desc}</p>
                      <div className="flex justify-between items-center">
                        <span className="text-purple-400 font-bold text-lg">{item.price} ر.س</span>
                        <button onClick={() => addToCart(item)} className="bg-purple-600 px-4 py-2 rounded-lg text-sm">أضف للسلة</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* الفوتر */}
          <footer className="p-10 text-center border-t border-white/10 text-gray-500">
            <p>© 2025 Hungry Bites - بحرة</p>
            <p className="mt-2">Developed by: <span className="text-purple-500">_itlb</span></p>
          </footer>

        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
