<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Hungry Bites | بيتس - بحرة</title>
  
  <!-- استدعاء الخطوط العربية والعالمية[span_1](start_span)[span_1](end_span) -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- مكتبة Tailwind CSS[span_2](start_span)[span_2](end_span) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05000a; font-family: 'Cairo', 'Montserrat', sans-serif; overflow-x: hidden; }
    html { scroll-behavior: smooth; }
    
    /* تأثير شاشة التحميل (Splash Screen) */
    .splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000000; display: flex; justify-content: center;
      align-items: center; z-index: 10000; transition: opacity 0.6s ease;
    }
    .splash-logo {
      font-size: 3.5rem; font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #a100ff, #FFD700);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: pulseLogo 1.2s ease-in-out infinite;
    }
    @keyframes pulseLogo {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 20px rgba(161,0,255,0.5); }
    }
    
    /* تصميم البطاقات الزجاجية[span_3](start_span)[span_3](end_span) */
    .glass-card {
      background: rgba(10, 0, 21, 0.75); backdrop-filter: blur(12px);
      border: 2px solid rgba(161, 0, 255, 0.4); transition: all 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-8px); border-color: #a100ff;
      box-shadow: 0 0 25px rgba(161, 0, 255, 0.5); background: rgba(161, 0, 255, 0.12);
    }

    /* سلة المشتريات الجانبية */
    .cart-sidebar {
      position: fixed; top: 0; right: -380px; width: 380px; height: 100vh;
      background: rgba(5, 0, 10, 0.98); backdrop-filter: blur(20px);
      border-right: 2px solid #a100ff; z-index: 1000; transition: right 0.25s ease;
    }
    .cart-sidebar.open { right: 0; }
  </style>
</head>
<body>
  <div id="splashScreen" class="splash-screen">
    <div class="splash-logo">Hungry Bites</div>
  </div>
  
  <div id="root"></div>

  <!-- مكتبات React الأساسية[span_4](start_span)[span_4](end_span) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // إخفاء شاشة التحميل
    setTimeout(() => {
      const splash = document.getElementById('splashScreen');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
      }
    }, 2500);

    const App = () => {
      const [cart, setCart] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);

      // إضافة منتج للسلة
      const addToCart = (item) => {
        setCart([...cart, { ...item, id: Date.now() }]);
      };

      return (
        <div className="min-h-screen text-white">
          {/* التنقل (Navbar)[span_5](start_span)[span_5](end_span) */}
          <nav className="fixed top-0 w-full z-50 p-5 flex justify-between items-center bg-black/50 backdrop-blur-md">
            <div className="text-2xl font-extrabold">Hungry <span className="text-yellow-500">Bites</span></div>
            <button onClick={() => setCartOpen(true)} className="relative p-2 bg-purple-600 rounded-full">
              <i className="fas fa-shopping-cart"></i>
              <span className="absolute -top-2 -right-2 bg-red-500 rounded-full w-5 h-5 text-xs flex items-center justify-center">{cart.length}</span>
            </button>
          </nav>

          {/* قسم العرض الرئيسي (Hero)[span_6](start_span)[span_6](end_span) */}
          <header className="h-screen flex items-center justify-center text-center px-5 bg-[url('https://images.pexels.com/photos/2983101/pexels-photo-2983101.jpeg')] bg-cover bg-center">
            <div className="bg-black/60 p-10 rounded-3xl backdrop-blur-sm">
              <h1 className="text-5xl md:text-7xl font-black mb-4">الجوع ماله حل.. <br/><span className="text-red-500">إلا بيتس!</span></h1>
              <p className="text-xl">فرع بحرة | أفضل تجربة برجر وفطور</p>
            </div>
          </header>

          {/* سلة المشتريات الجانبية[span_7](start_span)[span_7](end_span) */}
          <div className={`cart-sidebar ${cartOpen ? 'open' : ''} p-6`}>
            <div className="flex justify-between items-center mb-10">
              <h2 className="text-xl font-bold">سلة الطلبات</h2>
              <button onClick={() => setCartOpen(false)} className="text-3xl">&times;</button>
            </div>
            {cart.map(item => (
              <div key={item.id} className="mb-4 p-3 border-b border-purple-500/30 flex justify-between">
                <span>{item.name}</span>
                <span className="text-purple-400">{item.price} ر.س</span>
              </div>
            ))}
            <button className="w-full bg-green-600 py-3 rounded-full mt-10 font-bold">إرسال الطلب عبر واتساب</button>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
