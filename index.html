<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Hungry Bites | بيتس - بحرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #05000a; font-family: 'Cairo', 'Tajawal', sans-serif; overflow-x: hidden; }
    html { scroll-behavior: smooth; }
    
    .splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000000; display: flex; justify-content: center; align-items: center;
      z-index: 10000; transition: opacity 0.6s ease;
    }
    .splash-logo {
      font-size: 3.5rem; font-weight: 800;
      background: linear-gradient(135deg, #ffffff, #a100ff, #FFD700);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      animation: pulseLogo 1.2s ease-in-out infinite;
    }
    @keyframes pulseLogo {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 20px rgba(161,0,255,0.5); }
    }
    
    .navbar { transition: all 0.2s ease; }
    .navbar-scrolled { background: rgba(5, 0, 10, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(161, 0, 255, 0.3); }
    .logo-text { font-size: 1.6rem; font-weight: 800; }
    .logo-text .hungry { color: #ffffff; }
    .logo-text .bite { color: #ffffff; }
    .logo-text .bite-s { color: #FFD700; text-shadow: 0 0 3px #FFD700; }
    
    .smoke-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: hidden; }
    .smoke-particle { position: absolute; background: radial-gradient(circle, rgba(161, 0, 255, 0.3) 0%, rgba(100, 50, 150, 0) 80%); border-radius: 50%; filter: blur(12px); animation: floatSmoke 3.5s ease-out forwards; }
    @keyframes floatSmoke { 0% { transform: translateY(0) scale(0.3); opacity: 0.5; } 100% { transform: translateY(-180px) scale(1.8); opacity: 0; } }
    
    .glass-card { background: rgba(10, 0, 21, 0.75); backdrop-filter: blur(12px); border: 2px solid rgba(161, 0, 255, 0.4); transition: all 0.3s ease; }
    .glass-card:hover { transform: translateY(-6px); border-color: #a100ff; box-shadow: 0 0 20px rgba(161, 0, 255, 0.4); background: rgba(161, 0, 255, 0.1); }
    .pulse-border { animation: borderPulse 2s ease-in-out infinite; }
    @keyframes borderPulse { 0%, 100% { border-color: rgba(161, 0, 255, 0.4); } 50% { border-color: rgba(161, 0, 255, 0.8); box-shadow: 0 0 12px rgba(161, 0, 255, 0.3); } }
    .countdown-digits { color: #c084fc; text-shadow: 0 0 6px rgba(161, 0, 255, 0.3); font-weight: 700; }
    .open-indicator { animation: greenPulse 1.5s ease-in-out infinite; }
    @keyframes greenPulse { 0%, 100% { box-shadow: 0 0 4px #22c55e, 0 0 8px #22c55e; } 50% { box-shadow: 0 0 12px #22c55e, 0 0 18px #4ade80; } }
    
    .media-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
    .media-item { border-radius: 1.5rem; overflow: hidden; border: 2px solid rgba(161, 0, 255, 0.4); transition: all 0.3s ease; background: rgba(0,0,0,0.3); }
    .media-item:hover { transform: translateY(-5px); box-shadow: 0 0 20px rgba(161, 0, 255, 0.4); border-color: #a100ff; }
    .media-item img { width: 100%; height: 260px; object-fit: cover; transition: transform 0.5s ease; }
    .media-item:hover img { transform: scale(1.05); }
    
    .cart-sidebar { position: fixed; top: 0; right: -380px; width: 380px; height: 100vh; background: rgba(5, 0, 10, 0.98); backdrop-filter: blur(20px); border-right: 2px solid #a100ff; z-index: 1000; transition: right 0.25s ease; box-shadow: -5px 0 25px rgba(161, 0, 255, 0.25); }
    .cart-sidebar.open { right: 0; }
    .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 999; display: none; }
    .cart-overlay.open { display: block; }
    
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0015; }
    ::-webkit-scrollbar-thumb { background: #a100ff; border-radius: 10px; }
    .toast-msg { transition: opacity 0.2s ease; }
    
    /* ========== PROFESSIONAL MENU REVEAL ========== */
    .menu-section {
      padding: 4rem 1rem;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 100%);
    }
    .menu-container { max-width: 1280px; margin: 0 auto; padding: 0 1rem; }
    
    .menu-title {
      font-size: 2.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 3rem;
      background: linear-gradient(135deg, #ffffff 0%, #c084fc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: 'Cairo', 'Tajawal', sans-serif;
    }
    .menu-title::after {
      content: '';
      display: block;
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #a100ff, #ff6a00);
      margin: 0.75rem auto 0;
      border-radius: 3px;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }
    
    .menu-item-card {
      background: rgba(26, 26, 46, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 1.25rem;
      overflow: hidden;
      border: 1px solid rgba(161, 0, 255, 0.15);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: translateY(60px) scale(0.95);
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .menu-item-card.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .menu-item-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(161, 0, 255, 0.5);
      box-shadow: 0 15px 35px rgba(161, 0, 255, 0.25);
    }
    .menu-item-image { position: relative; padding-top: 66.67%; overflow: hidden; }
    .menu-item-image img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .menu-item-card:hover .menu-item-image img { transform: scale(1.08); }
    .menu-item-content { padding: 1.5rem; direction: rtl; }
    .menu-item-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.5rem; color: #ffffff; font-family: 'Cairo', 'Tajawal', sans-serif; }
    .menu-item-desc { font-size: 0.85rem; line-height: 1.5; color: #b0b0b0; margin-bottom: 1.25rem; font-family: 'Tajawal', 'Cairo', sans-serif; }
    .menu-item-footer { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .menu-item-price { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, #a100ff 0%, #c84bff 100%); -webkit-background-clip: text; background-clip: text; color: transparent; font-family: 'Cairo', monospace; }
    .menu-order-btn {
      padding: 0.6rem 1.25rem;
      background: linear-gradient(90deg, #a100ff 0%, #c84bff 100%);
      border: none;
      border-radius: 2rem;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Cairo', 'Tajawal', sans-serif;
    }
    .menu-order-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(161, 0, 255, 0.5); }
    
    @media (max-width: 768px) {
      .menu-section { padding: 2rem 1rem; }
      .menu-title { font-size: 2rem; margin-bottom: 2rem; }
      .menu-grid { gap: 1.5rem; }
      .menu-item-content { padding: 1.25rem; }
      .menu-item-title { font-size: 1.2rem; }
    }
    
    /* Order options modal */
    .order-options-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s ease;
    }
    .order-options-modal.open {
      visibility: visible;
      opacity: 1;
    }
    .order-options-card {
      background: rgba(10, 10, 20, 0.95);
      border-radius: 2rem;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(161, 0, 255, 0.5);
      box-shadow: 0 0 30px rgba(161, 0, 255, 0.3);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    .order-options-modal.open .order-options-card {
      transform: scale(1);
    }
    .order-options-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: white;
    }
    .order-option-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      margin: 1rem 0;
      border: none;
      border-radius: 3rem;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Cairo', 'Tajawal', sans-serif;
    }
    .order-option-delivery {
      background: linear-gradient(90deg, #a100ff, #c84bff);
      color: white;
    }
    .order-option-pickup {
      background: linear-gradient(90deg, #ff6a00, #ff9a44);
      color: white;
    }
    .order-option-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(161,0,255,0.5);
    }
    .close-options {
      background: rgba(255,255,255,0.1);
      color: #ccc;
      margin-top: 0.5rem;
    }
    .close-options:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="splashScreen" class="splash-screen">
    <div class="splash-logo">Hungry Bites</div>
  </div>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    setTimeout(() => {
      const splash = document.getElementById('splashScreen');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
      }
    }, 2500);

    const SmokeEffect = () => {
      const containerRef = useRef(null);
      useEffect(() => {
        const interval = setInterval(() => {
          if (!containerRef.current) return;
          const particle = document.createElement('div');
          particle.className = 'smoke-particle';
          const size = 40 + Math.random() * 60;
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          particle.style.left = `${20 + Math.random() * 65}%`;
          particle.style.bottom = '0px';
          particle.style.animationDuration = `${2.8 + Math.random() * 1.8}s`;
          containerRef.current.appendChild(particle);
          setTimeout(() => particle.remove(), 4000);
        }, 350);
        return () => clearInterval(interval);
      }, []);
      return <div ref={containerRef} className="smoke-container"></div>;
    };
    
    const useSmartCountdown = () => {
      const [isOpen, setIsOpen] = useState(false);
      const [timeLeft, setTimeLeft] = useState(null);
      
      useEffect(() => {
        const calculate = () => {
          const now = new Date();
          const target = new Date(now);
          target.setHours(19, 0, 0, 0);
          if (now >= target) {
            setIsOpen(true);
            setTimeLeft(null);
            return;
          }
          setIsOpen(false);
          const diff = target - now;
          const hours = Math.floor(diff / (1000 * 60 * 60));
          const minutes = Math.floor((diff % 3600000) / 60000);
          const seconds = Math.floor((diff % 60000) / 1000);
          setTimeLeft({ hours, minutes, seconds });
        };
        calculate();
        const interval = setInterval(calculate, 1000);
        return () => clearInterval(interval);
      }, []);
      return { isOpen, timeLeft };
    };
    
    const menuItems = [
      { id: 1, name: "بيف كلاسيك", price: 34, desc: "قطعة لحم مشوية مع الجبن والخيار الطازجة وصفة خاصة", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&auto=format" },
      { id: 2, name: "دبل تشيز برجر", price: 45, desc: "شريحتان لحم أنجوس مع طبقة مزدوجة من الجبنة الذائبة", img: "https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=600&auto=format" },
      { id: 3, name: "سبيسي تشيكن", price: 32, desc: "دجاج مقرمش بخلطة حارة مميزة مع الصوص السري", img: "https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=600&auto=format" },
      { id: 4, name: "بطاطس لوديد", price: 22, desc: "بطاطس مقلية مع الجبن والبيكون وصوص الرانش", img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=600&auto=format" },
      { id: 5, name: "دجاج كريسبي", price: 28, desc: "قطع دجاج مقرمشة بخلطة سرية من المطبخ", img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=600&auto=format" },
      { id: 6, name: "كلوب ساندوتش", price: 29, desc: "ساندوتش دجاج مشوي مع خضار طازجة ومايونيز", img: "https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=600&auto=format" },
      { id: 7, name: "موهيتو التوت", price: 16, desc: "مشروب منعش بنكهات التوت الطبيعي", img: "https://images.unsplash.com/photo-1544145945-f90425340c7e?w=600&auto=format" },
      { id: 8, name: "ميلك شيك أوريو", price: 18, desc: "مشروب بارد بنكهة الأوريو والكريمة المخفوقة", img: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=600&auto=format" },
      { id: 9, name: "فطور الشيف", price: 45, desc: "بيض عيون، بطاطس، فول، جبنة، خبز طازج", img: "https://images.unsplash.com/photo-1533089860892-a7c6f0a88666?w=600&auto=format" },
      { id: 10, name: "عجة بحرة", price: 32, desc: "عجة بالخضار الطازجة مع جبنة موزاريلا", img: "https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=600&auto=format" }
    ];
    
    const galleryImages = [
      { src: "https://images.pexels.com/photos/260922/pexels-photo-260922.jpeg?auto=compress&w=600", title: "👨‍👩‍👧‍ جلسات عائلية ممتعة" },
      { src: "https://images.pexels.com/photos/2983101/pexels-photo-2983101.jpeg?auto=compress&w=600", title: "🍔 برجر طازج من مطبخنا" },
      { src: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?auto=compress&w=600", title: "🧀 تشيز برجر بالجبنة الذائبة" },
      { src: "https://images.pexels.com/photos/1583884/pexels-photo-1583884.jpeg?auto=compress&w=600", title: "🍟 بطاطس لوديد بالجبن" }
    ];
    
    const App = () => {
      const { isOpen, timeLeft } = useSmartCountdown();
      const [scrolled, setScrolled] = useState(false);
      const [cart, setCart] = useState([]);
      const [cartOpen, setCartOpen] = useState(false);
      const [toast, setToast] = useState({ show: false, message: "" });
      const [showOrderOptions, setShowOrderOptions] = useState(false);
      const heroRef = useRef(null);
      const menuRef = useRef(null);
      const galleryRef = useRef(null);
      const locationRef = useRef(null);
      
      useEffect(() => {
        const cards = document.querySelectorAll('.menu-item-card');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
              setTimeout(() => entry.target.classList.add('is-visible'), index * 150);
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
        cards.forEach(card => observer.observe(card));
        return () => observer.disconnect();
      }, []);
      
      useEffect(() => {
        const saved = localStorage.getItem("hungry_cart_bahrah");
        if (saved) setCart(JSON.parse(saved));
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);
      
      const saveCart = (newCart) => {
        setCart(newCart);
        localStorage.setItem("hungry_cart_bahrah", JSON.stringify(newCart));
      };
      
      const addToCart = (item) => {
        const existingItem = cart.find(i => i.id === item.id);
        let newCart;
        if (existingItem) {
          newCart = cart.map(i => i.id === item.id ? { ...i, quantity: i.quantity + 1 } : i);
        } else {
          newCart = [...cart, { ...item, quantity: 1 }];
        }
        saveCart(newCart);
        setToast({ show: true, message: `✨ تم إضافة ${item.name} إلى السلة` });
        setTimeout(() => setToast({ show: false, message: "" }), 1500);
      };
      
      const removeFromCart = (id) => {
        const newCart = cart.filter(i => i.id !== id);
        saveCart(newCart);
        setToast({ show: true, message: `❌ تم إزالة المنتج` });
        setTimeout(() => setToast({ show: false, message: "" }), 1500);
      };
      
      const updateQuantity = (id, delta) => {
        const item = cart.find(i => i.id === id);
        if (!item) return;
        const newQuantity = item.quantity + delta;
        if (newQuantity <= 0) {
          removeFromCart(id);
          return;
        }
        const newCart = cart.map(i => i.id === id ? { ...i, quantity: newQuantity } : i);
        saveCart(newCart);
      };
      
      const getTotalPrice = () => cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const getItemCount = () => cart.reduce((sum, item) => sum + item.quantity, 0);
      
      const sendToWhatsAppWithOption = (option) => {
        if (cart.length === 0) {
          setToast({ show: true, message: "⚠️ أضف أطباقاً إلى السلة أولاً" });
          setTimeout(() => setToast({ show: false, message: "" }), 1500);
          return;
        }
        let optionText = option === 'delivery' ? '📦 توصيل' : '🏠 استلام شخصي';
        let msg = `مرحباً Hungry Bites 🌟%0Aأرغب في طلب (${optionText}):%0A`;
        cart.forEach((item, idx) => {
          msg += `${idx+1}- ${item.name} (${item.quantity}) - ${item.price * item.quantity} ر.س%0A`;
        });
        msg += `%0Aالإجمالي: ${getTotalPrice()} ر.س%0Aالموقع: بحرة%0A`;
        
        // Add delivery location reminder
        if (option === 'delivery') {
          msg += `⚠️ تنبيه: يرجى إرسال موقعك على الخريطة لتوصيل الطلب ⚠️%0A`;
        }
        msg += `شكراً 🙏`;
        window.open(`https://wa.me/966564035409?text=${msg}`, '_blank');
      };
      
      const promptOrderOptions = () => {
        if (cart.length === 0) {
          setToast({ show: true, message: "⚠️ أضف أطباقاً إلى السلة أولاً" });
          setTimeout(() => setToast({ show: false, message: "" }), 1500);
          return;
        }
        setShowOrderOptions(true);
      };
      
      const clearCart = () => {
        saveCart([]);
        setToast({ show: true, message: `🗑️ تم تفريغ السلة` });
        setTimeout(() => setToast({ show: false, message: "" }), 1500);
      };
      
      const scrollToSection = (ref) => {
        ref.current?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      return (
        <div className="min-h-screen">
          {/* Order Options Modal */}
          <div className={`order-options-modal ${showOrderOptions ? 'open' : ''}`} onClick={() => setShowOrderOptions(false)}>
            <div className="order-options-card" onClick={(e) => e.stopPropagation()}>
              <div className="order-options-title">اختر طريقة الطلب</div>
              <button className="order-option-btn order-option-delivery" onClick={() => { sendToWhatsAppWithOption('delivery'); setShowOrderOptions(false); }}>📦 توصيل</button>
              <button className="order-option-btn order-option-pickup" onClick={() => { sendToWhatsAppWithOption('pickup'); setShowOrderOptions(false); }}>🏠 استلام شخصي</button>
              <button className="order-option-btn close-options" onClick={() => setShowOrderOptions(false)}>إلغاء</button>
            </div>
          </div>
          
          <div className={`cart-overlay ${cartOpen ? 'open' : ''}`} onClick={() => setCartOpen(false)}></div>
          <div className={`cart-sidebar ${cartOpen ? 'open' : ''}`}>
            <div className="p-5 flex flex-col h-full">
              <div className="flex justify-between items-center border-b border-[#a100ff] pb-3">
                <h3 className="text-xl font-bold text-white"><i className="fas fa-shopping-cart text-[#c084fc] ml-2"></i>سلة الطلبات</h3>
                <button onClick={() => setCartOpen(false)} className="text-gray-400 hover:text-white text-2xl">&times;</button>
              </div>
              <div className="flex-1 overflow-y-auto mt-4 space-y-3">
                {cart.length === 0 ? (
                  <p className="text-gray-400 text-center py-10">السلة فارغة 🛒<br/>أضف أطباقك المفضلة</p>
                ) : (
                  cart.map(item => (
                    <div key={item.id} className="glass-card rounded-xl p-3">
                      <div className="flex justify-between items-start">
                        <div className="flex-1">
                          <p className="text-white font-bold">{item.name}</p>
                          <p className="text-[#c084fc] text-sm">{item.price} ر.س</p>
                        </div>
                        <div className="flex items-center gap-2">
                          <button onClick={() => updateQuantity(item.id, -1)} className="bg-red-500/30 text-white w-8 h-8 rounded-full hover:bg-red-500 transition">-</button>
                          <span className="text-white w-6 text-center font-bold">{item.quantity}</span>
                          <button onClick={() => updateQuantity(item.id, 1)} className="bg-green-500/30 text-white w-8 h-8 rounded-full hover:bg-green-500 transition">+</button>
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
              <div className="border-t border-white/10 pt-4 mt-4">
                <div className="flex justify-between text-white font-bold mb-3 text-lg">
                  <span>الإجمالي:</span>
                  <span className="text-[#c084fc]">{getTotalPrice()} ر.س</span>
                </div>
                <div className="flex gap-3">
                  <button onClick={clearCart} className="flex-1 bg-red-500/20 border border-red-500 rounded-full py-2 text-red-400 text-sm">تفريغ</button>
                  <button onClick={promptOrderOptions} className="flex-1 bg-green-600 hover:bg-green-700 rounded-full py-2 text-white flex items-center justify-center gap-2"><i className="fab fa-whatsapp"></i> طلب</button>
                </div>
              </div>
            </div>
          </div>
          
          <nav className={`navbar fixed top-0 w-full z-50 py-4 px-5 transition-all ${scrolled ? 'navbar-scrolled' : 'bg-transparent'}`}>

              <div className="logo-text"><span className="hungry">Hungry </span><span className="bite">Bite</span><span className="bite-s">s</span></div>

                <button onClick={() => scrollToSection(galleryRef)} className="hover:text-[#c084fc] transition">معرض الصور</button>
                <button onClick={() => scrollToSection(locationRef)} className="hover:text-[#c084fc] transition">موقعنا</button>

                  {getItemCount() > 0 && <span className="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">{getItemCount()}</span>}
                </button>
                <button onClick={promptOrderOptions} className="bg-[#a100ff]/20 border border-[#a100ff] px-4 py-2 rounded-full text-xs font-bold text-white hover:bg-[#a100ff]/40 transition">اطلب الآن</button>
              </div>
            </div>
          </nav>

            <img src="https://images.pexels.com/photos/2983101/pexels-photo-2983101.jpeg?auto=compress&w=1600" className="absolute inset-0 w-full h-full object-cover brightness-[0.25]" />

            <SmokeEffect />
            <div className="relative z-10 container mx-auto px-5 text-right">

              </h1>
              <p className="text-xl md:text-2xl text-gray-200 mt-4 border-r-4 border-[#c084fc] pr-4">فرع بحرة | Bahrah Branch</p>
              
              {!isOpen && timeLeft && (
                <div className="mt-8 inline-block bg-black/60 backdrop-blur-md p-6 rounded-3xl border border-[#a100ff]/40">
                  <p className="text-gray-300 text-sm mb-2"><i className="fas fa-hourglass-half ml-1 text-[#c084fc]"></i> الافتتاح اليوم الساعة 7:00 م</p>
                  <div className="text-5xl md:text-6xl font-bold countdown-digits font-montserrat">
                    {String(timeLeft.hours).padStart(2,'0')}:{String(timeLeft.minutes).padStart(2,'0')}:{String(timeLeft.seconds).padStart(2,'0')}
                  </div>
                </div>
              )}

              {isOpen && (
                <div className="mt-10">
                  <div className="inline-flex items-center gap-3 bg-green-500/25 border border-green-500 px-6 py-3 rounded-full open-indicator mb-6">
                    <span className="h-3 w-3 rounded-full bg-green-500 animate-pulse"></span>
                    <span className="text-green-400 font-bold">مفتوح الآن في بحرة | OPEN NOW</span>
                  </div>
                  <button onClick={promptOrderOptions} className="bg-gradient-to-r from-[#a100ff] to-purple-700 hover:from-purple-600 hover:to-[#a100ff] text-white font-bold py-4 px-10 rounded-full text-xl shadow-xl hover:scale-105 transition flex items-center gap-3">
                    <i className="fab fa-whatsapp text-2xl"></i> اطلب الآن
                  </button>
                </div>
              )}
            </div>
          </div>
          
          <div ref={menuRef} className="menu-section">
            <div className="menu-container">
              <h2 className="menu-title">قائمتنا</h2>
              <div className="menu-grid">
                {menuItems.map((item) => (
                  <div key={item.id} className="menu-item-card">
                    <div className="menu-item-image">
                      <img src={item.img} alt={item.name} loading="lazy" />
                    </div>
                    <div className="menu-item-content">
                      <h3 className="menu-item-title">{item.name}</h3>
                      <p className="menu-item-desc">{item.desc}</p>
                      <div className="menu-item-footer">
                        <span className="menu-item-price">{item.price} ر.س</span>
                        <button className="menu-order-btn" onClick={() => addToCart(item)}>أضف للسلة</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          
          <div ref={galleryRef} className="container mx-auto px-5 py-16">
            <div className="flex items-center gap-3 mb-8 border-r-4 border-[#a100ff] pr-5">
              <i className="fas fa-images text-3xl text-[#c084fc]"></i>
              <h2 className="text-3xl font-bold text-white">معرض الصور | أجواء Hungry Bites</h2>
            </div>
            <div className="media-gallery">
              {galleryImages.map((img, idx) => (
                <div key={idx} className="media-item">
                  <img src={img.src} alt={img.title} loading="lazy" />
                  <div className="p-3 text-center text-gray-300 text-sm font-medium">{img.title}</div>
                </div>
              ))}
            </div>
          </div>
          
          <div ref={locationRef} className="container mx-auto px-5 pb-20">
            <div className="grid md:grid-cols-2 gap-8">
              <div className="glass-card rounded-2xl p-8">
                <div className="flex items-center gap-3 mb-4">
                  <i className="fas fa-address-card text-2xl text-[#c084fc]"></i>
                  <h3 className="text-2xl font-bold text-white">قصتنا في بحرة</h3>
                </div>
                <p className="text-gray-200 leading-relaxed">
                  في <strong className="text-[#c084fc]">Hungry Bites</strong> نؤمن أن الطعام ليس مجرد وجبة، بل تجربة متكاملة تجمع العائلة والأصدقاء. 
                  نستخدم أجود أنواع اللحوم المحلية الطازجة ونحضر صوصاتنا يومياً لنضمن لك مذاقاً لا يُنسى.
                </p>
                <div className="grid grid-cols-2 gap-3 mt-6">
                  <div className="flex items-center gap-2 text-[#c084fc] text-sm"><i className="fas fa-check-circle"></i> <span className="text-white">لحم طازج 100%</span></div>
                  <div className="flex items-center gap-2 text-[#c084fc] text-sm"><i className="fas fa-check-circle"></i> <span className="text-white">فطور طازج يومياً</span></div>
                  <div className="flex items-center gap-2 text-[#c084fc] text-sm"><i className="fas fa-check-circle"></i> <span className="text-white">جلسات عائلية</span></div>
                  <div className="flex items-center gap-2 text-[#c084fc] text-sm"><i className="fas fa-check-circle"></i> <span className="text-white">خدمة سريعة</span></div>
                </div>
              </div>
              <div className="glass-card rounded-2xl p-8 text-center">
                <i className="fas fa-map-marker-alt text-4xl text-[#c084fc] mb-4"></i>
                <h3 className="text-2xl font-bold text-white mb-2">موقعنا في بحرة</h3>
                <p className="text-gray-300 mb-2">📍 بحرة</p>
                <p className="text-gray-400 text-sm mb-6"></p>
                <a href="https://maps.app.goo.gl/vc7DUJELaYUHmqsE8" target="_blank" className="inline-flex items-center gap-2 bg-[#a100ff]/20 border border-[#a100ff] rounded-full px-6 py-3 text-white font-bold hover:bg-[#a100ff]/40 transition">
                  <i className="fab fa-google"></i> فتح الخريطة / Directions
                </a>
              </div>
            </div>
          </div>
          
          <div className={`fixed bottom-24 left-6 z-50 bg-black/90 backdrop-blur-md border-r-4 border-[#c084fc] text-white px-5 py-3 rounded-full text-sm toast-msg pointer-events-none ${toast.show ? 'opacity-100' : 'opacity-0'}`}>
            <i className="fas fa-check-circle text-[#c084fc] ml-2"></i> {toast.message}
          </div>
          
          <footer className="border-t border-white/10 py-6 mt-4">
            <div className="container mx-auto px-5 flex flex-col md:flex-row justify-between items-center gap-4 text-gray-400 text-sm">
              <div className="flex items-center gap-2">
                <i className="fab fa-tiktok text-xl text-white"></i>
                <a href="https://www.tiktok.com/@hungrybites0" target="_blank" className="hover:text-[#c084fc] transition">@hungrybites0</a>
              </div>
              <div><span className="opacity-80">Developed by: <a href="https://www.tiktok.com/@_itlb" target="_blank" className="text-[#c084fc] font-bold hover:underline transition">_itlb</a></span></div>
              <div className="flex items-center gap-2"><i className="fab fa-whatsapp text-green-500"></i><span>طلبات: 056 403 5409</span></div>
            </div>
            <p className="text-center text-gray-600 text-xs mt-4">© 2025 Hungry Bites - بحرة | برقر وفطور طازج | أجواء عائلية لا تُنسى</p>
          </footer>
        </div>
      );
    };
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
